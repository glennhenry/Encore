product: jvm/app

settings:
  kotlin:
    version: 2.3.10
    languageVersion: 2.3
    serialization: enabled
  ktor:
    enabled: true
  jvm:
    mainClass: ApplicationKt
    jdk:
      version: 25

dependencies:
  # Ktor core
  - $libs.ktor.server.core
  - $libs.ktor.server.netty
  - $libs.ktor.server.cors
  - $libs.ktor.server.status.pages
  - $libs.logger.noop

  # Ktor serialization
  - $libs.ktor.server.websockets
  - $libs.ktor.server.content.negotiation
  - $libs.ktor.serialization.kotlinx.json
  - $libs.ktor.serialization.kotlinx.protobuf

  # Security
  - $libs.library.bcrypt

  # Database
  - $libs.mongodb.driver.kotlin.coroutine
  - $libs.mongodb.bson.kotlinx

test-dependencies:
  - $libs.kotlin.test.junit
  - $libs.ktor.server.test.host
