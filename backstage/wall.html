<!DOCTYPE html>
<html lang="">
<head>
    <title>Backstage Door</title>
</head>
<body>
<p>Enter Backstage Token (obtained from terminal by typing 'token') which is valid for one minute.</p>
<p>{{MESSAGE}}</p>

<label for="tokenInput">Token</label><input id="tokenInput" type="text" placeholder="Token">
<button onclick="go()">Enter</button>

<script>
    function go() {
        const t = document.getElementById("tokenInput").value;
        if (t.length > 0) {
            window.location = "/backstage?token=" + encodeURIComponent(t);
        }
    }
</script>

</body>
</html>
